name: Build APK from Tag 0.3.0

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Tag 0.3.0
        uses: actions/checkout@v4
        with:
          ref: 0.3.0
          fetch-depth: 0

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
          cache: 'gradle'

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android, x86_64-linux-android

      - name: Install cargo-ndk
        run: cargo install cargo-ndk --locked

      - name: Setup Android SDK & NDK
        uses: android-actions/setup-android@v3
        with:
          cmdline-tools-version: 'latest'

      - name: Setup Android NDK
        uses: nttld/setup-ndk@v1
        with:
          ndk-version: r26d
          add-to-path: true

      - name: Set environment variables
        run: |
          echo "ANDROID_SDK_ROOT=$ANDROID_HOME" >> $GITHUB_ENV
          echo "ANDROID_NDK_HOME=$ANDROID_NDK_ROOT" >> $GITHUB_ENV
          echo "ANDROID_NDK_ROOT=$ANDROID_NDK_ROOT" >> $GITHUB_ENV
          echo "CARGO_NDK_PLATFORM=28" >> $GITHUB_ENV
          echo "VARIANT=debug" >> $GITHUB_ENV

      - name: Make scripts executable
        run: chmod +x ./platform/scripts/*.sh ./platform/android/gradlew

      - name: Debug Environment
        run: |
          echo "=== Rust ==="
          rustc --version
          cargo --version
          rustup target list --installed
          echo "=== Android ==="
          echo "ANDROID_SDK_ROOT=$ANDROID_SDK_ROOT"
          echo "ANDROID_NDK_HOME=$ANDROID_NDK_HOME"
          ls -la $ANDROID_NDK_HOME/toolchains/llvm/prebuilt/linux-x86_64/bin/ 2>/dev/null | head -8 || echo "NDK bin not found"
          echo "=== Gradle ==="
          ./platform/android/gradlew --version

      - name: Run package_android_apk.sh
        run: ./platform/scripts/package_android_apk.sh
        env:
          ANDROID_NDK_HOME: ${{ env.ANDROID_NDK_ROOT }}
          VARIANT: debug

      - name: Upload APK if built
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: rfvp-0.3.0-debug-apk
          path: platform/android/app/build/outputs/apk/debug/app-debug.apk
