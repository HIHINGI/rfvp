name: Build APK from Tag 0.3.0

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Tag 0.3.0
        uses: actions/checkout@v4
        with:
          ref: 0.3.0          # 强制使用 0.3.0 这个 Tag 的代码
          fetch-depth: 0

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
          cache: 'gradle'

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android, x86_64-linux-android

      - name: Install cargo-ndk
        run: cargo install cargo-ndk

      - name: Setup Android NDK
        uses: nttld/setup-ndk@v1
        with:
          ndk-version: r26d

      - name: Set environment variables
        run: |
          echo "ANDROID_SDK_ROOT=$ANDROID_HOME" >> $GITHUB_ENV
          echo "ANDROID_NDK_HOME=$ANDROID_NDK_ROOT" >> $GITHUB_ENV

      - name: Make scripts executable
        run: chmod +x ./platform/scripts/*.sh && chmod +x ./gradlew

      - name: Build APK using official script
        run: ./platform/scripts/package_android_apk.sh

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: rfvp-0.3.0-debug-apk
          path: platform/android/app/build/outputs/apk/debug/app-debug.apk
